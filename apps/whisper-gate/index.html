<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f14" />
  <title>Whisper Gate — OMO</title>
  <link rel="stylesheet" href="../../shared/ui.css" />
</head>
<body class="app-shell">
  <header class="app-header">
    <a class="back-link" href="../../">←</a>
    <h1>Whisper Gate</h1>
  </header>
  <div class="learn-panel panel" id="learnPanel">
    <h2>Whisper gate</h2>
    <p>Turn <strong>Audio on</strong> and allow the mic. <strong>Hold</strong> the pad for a vowel tone — only <strong>soft</strong> whispers pass the gate; loud noise stays muted.</p>
  </div>
  <p class="status-bar" id="status">Turn Audio on, then hold pad</p>
  <div class="main-stage">
    <div id="pad" class="stage-fill play-grid"><div class="touch-dot" id="dot"></div></div>
  </div>
  <script type="module">
    import { bindLearn, registerAudioBoot, setStatus, startAudio } from "../../shared/app.js";
    import { connectMicAnalyser, createMasterBus, getMicStream, primeMicStream } from "../../shared/audio.js";

    bindLearn();

    const pad = document.getElementById("pad");
    const dot = document.getElementById("dot");

    let ctx, master, noise, filter, toneGain, built = false;
    let micStream = null;
    let analyser = null;
    let buf = null;
    let holding = false;
    let activeId = null;
    let loopOn = false;
    let noiseFloor = 0.01;

    function buildAudio(c) {
      ctx = c;
      ({ master } = createMasterBus(c, 0.45));
      const len = ctx.sampleRate * 2;
      const b = ctx.createBuffer(1, len, ctx.sampleRate);
      const d = b.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      noise = ctx.createBufferSource();
      noise.buffer = b;
      noise.loop = true;
      filter = ctx.createBiquadFilter();
      filter.type = "bandpass";
      filter.frequency.value = 600;
      filter.Q.value = 8;
      toneGain = ctx.createGain();
      toneGain.gain.value = 0;
      noise.connect(filter);
      filter.connect(toneGain);
      toneGain.connect(master);
      noise.start();
      built = true;
    }

    registerAudioBoot(buildAudio, { mic: true });

    async function ensureMic() {
      if (micStream) return true;
      try {
        micStream = await getMicStream();
      } catch {
        setStatus("status", "Mic blocked — allow microphone", "warn");
        return false;
      }
      if (!analyser) {
        analyser = ctx.createAnalyser();
        analyser.fftSize = 256;
        connectMicAnalyser(ctx, micStream, analyser, { inputGain: 1.5 });
        buf = new Float32Array(analyser.fftSize);
      }
      return true;
    }

    function readRms() {
      if (!analyser || !buf) return 0;
      analyser.getFloatTimeDomainData(buf);
      let s = 0;
      for (let i = 0; i < buf.length; i++) s += buf[i] * buf[i];
      return Math.sqrt(s / buf.length);
    }

    function softGateOpen(rms) {
      noiseFloor = noiseFloor * 0.995 + rms * 0.005;
      return rms > noiseFloor * 1.1 && rms < noiseFloor * 4;
    }

    function tick() {
      if (!ctx || !built) return;
      const rms = readRms();
      const pass = softGateOpen(rms);
      const t = ctx.currentTime;
      const open = holding && pass;
      toneGain.gain.setTargetAtTime(open ? 0.36 : 0, t, 0.05);
      filter.frequency.setTargetAtTime(open ? 800 : pass ? 520 : 220, t, 0.06);
      requestAnimationFrame(tick);
    }

    function startLoop() {
      if (loopOn) return;
      loopOn = true;
      tick();
    }

    async function arm(e) {
      e.preventDefault();
      primeMicStream();
      await startAudio(!built ? buildAudio : undefined);
      if (!built || !ctx) return;
      if (!(await ensureMic())) return;
      startLoop();
      holding = true;
      activeId = e.pointerId;
      pad.setPointerCapture(e.pointerId);
      pad.classList.add("active");
      dot.style.opacity = "1";
      setStatus("status", "Whisper softly while holding", "ok");
    }

    function release(e) {
      if (e.pointerId !== activeId) return;
      holding = false;
      activeId = null;
      pad.classList.remove("active");
      dot.style.opacity = "0";
      if (ctx && toneGain) toneGain.gain.setTargetAtTime(0, ctx.currentTime, 0.06);
    }

    pad.addEventListener("pointerdown", (e) => void arm(e));
    pad.addEventListener("pointerup", release);
    pad.addEventListener("pointercancel", release);
    pad.addEventListener("lostpointercapture", release);
  </script>
</body>
</html>
