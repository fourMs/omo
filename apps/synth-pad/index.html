<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f14" />
  <title>Synth Pad — OMO</title>
  <link rel="stylesheet" href="../../shared/ui.css" />
  <style>
    #cursor {
      transform-origin: center center;
      transition: transform 0.04s ease-out;
    }
  </style>
</head>
<body class="app-shell">
  <header class="app-header">
    <a class="back-link" href="../../">←</a>
    <h1>Synth Pad</h1>
  </header>
  <div class="learn-panel panel" id="learnPanel">
    <h2>Sound synthesis</h2>
    <p>Turn <strong>Audio on</strong>, then <strong>X</strong> = pitch. <strong>Y</strong> = filter cutoff. <strong>Press harder</strong> = louder + brighter (aftertouch) when your device reports force or touch size.</p>
    <p><strong>FM</strong> = frequency modulation; pressure also deepens the mod amount.</p>
  </div>
  <div class="control-row">
    <label for="wave">Wave</label>
    <select id="wave">
      <option value="sine">Sine</option>
      <option value="square">Square</option>
      <option value="sawtooth" selected>Saw</option>
      <option value="fm">FM</option>
    </select>
  </div>
  <div class="readout-row">
    <p class="value-chip">Press <strong id="pressOut">—</strong></p>
    <p class="value-chip" id="pressSrcChip" hidden><span id="pressSrc">—</span></p>
  </div>
  <div class="main-stage">
    <div id="pad" class="stage-fill play-grid"><div class="touch-dot" id="cursor"></div></div>
  </div>
  <script type="module">
    import { bindLearn, startAudio } from "../../shared/app.js";
    import { applyEnvelope, createMasterBus, midiToFreq } from "../../shared/audio.js";

    bindLearn();
    const pad = document.getElementById("pad");
    const cursor = document.getElementById("cursor");
    const waveSel = document.getElementById("wave");
    let ctx, master, voice = null;
    let built = false;
    let activePointer = null;

    const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

    /** @returns {{ value: number, source: 'force' | 'size' | 'tap' }} */
    function readPressure(e) {
      const p = e.pressure;
      if (typeof p === "number" && p > 0 && (p < 0.48 || p > 0.52 || p >= 0.99)) {
        return { value: clamp(p, 0.05, 1), source: "force" };
      }
      const rx = e.radiusX ?? 0;
      const ry = e.radiusY ?? 0;
      if (rx > 0.5 || ry > 0.5) {
        const size = Math.max(rx, ry) * 2;
        return { value: clamp(0.22 + size / 26, 0.22, 1), source: "size" };
      }
      const w = e.width ?? 0;
      const h = e.height ?? 0;
      if (w > 1.2 || h > 1.2) {
        const size = Math.hypot(w, h);
        return { value: clamp(0.2 + (size - 14) / 42, 0.2, 1), source: "size" };
      }
      return { value: 0.55, source: "tap" };
    }

    function updatePressureUI(pressure, source) {
      document.getElementById("pressOut").textContent = `${(pressure * 100).toFixed(0)}%`;
      const chip = document.getElementById("pressSrcChip");
      const srcEl = document.getElementById("pressSrc");
      if (source === "force") {
        chip.hidden = false;
        srcEl.textContent = "3D force";
      } else if (source === "size") {
        chip.hidden = false;
        srcEl.textContent = "touch size";
      } else {
        chip.hidden = true;
      }
    }

    function buildAudio(c) {
      ctx = c;
      ({ master } = createMasterBus(ctx));
      built = true;
    }

    function stopVoice() {
      if (!voice) return;
      voice.env.release();
      const nodes = voice.nodes;
      setTimeout(() => {
        nodes.forEach((n) => {
          try {
            n.disconnect();
          } catch {
            /* noop */
          }
        });
      }, 400);
      voice = null;
    }

    function applyPressure(pressure, when) {
      if (!voice?.amp) return;
      const level = 0.06 + pressure * 0.58;
      voice.amp.gain.setTargetAtTime(level, when, 0.03);
      voice.filter.Q.setTargetAtTime(2 + pressure * 18, when, 0.04);
      if (voice.modGain) {
        const modDepth = voice.baseMod * (0.45 + pressure * 0.85);
        const yBoost = voice.fmYNorm != null ? voice.baseMod * voice.fmYNorm * 0.35 : 0;
        voice.modGain.gain.setTargetAtTime(modDepth + yBoost, when, 0.04);
      }
    }

    function startVoice(freq, cutoff, pressure, ny = 0.5) {
      if (!built) return;
      stopVoice();
      const t = ctx.currentTime;
      const amp = ctx.createGain();
      amp.connect(master);
      const filt = ctx.createBiquadFilter();
      filt.type = "lowpass";
      filt.frequency.value = cutoff;
      filt.Q.value = 2 + pressure * 18;
      filt.connect(amp);
      const peak = 0.12 + pressure * 0.55;
      const sustain = 0.35 + pressure * 0.25;
      const env = applyEnvelope(amp, ctx, {
        peak,
        sustain,
        attack: 0.015,
        decay: 0.08,
        release: 0.25,
      });
      const nodes = [amp, filt];
      let osc;
      let modOsc = null;
      let modGain = null;
      let baseMod = 0;
      if (waveSel.value === "fm") {
        const carrier = ctx.createOscillator();
        const mod = ctx.createOscillator();
        modGain = ctx.createGain();
        baseMod = freq * 0.8;
        mod.frequency.value = freq * 1.5;
        modGain.gain.value = baseMod * (0.45 + pressure * 0.85);
        mod.connect(modGain);
        modGain.connect(carrier.frequency);
        carrier.frequency.value = freq;
        carrier.type = mod.type = "sine";
        carrier.connect(filt);
        carrier.start(t);
        mod.start(t);
        nodes.push(carrier, mod, modGain);
        osc = carrier;
        modOsc = mod;
      } else {
        osc = ctx.createOscillator();
        osc.type = waveSel.value;
        osc.frequency.value = freq;
        osc.connect(filt);
        osc.start(t);
        nodes.push(osc);
      }
      voice = {
        env,
        nodes,
        filter: filt,
        osc,
        modOsc,
        modGain,
        amp,
        baseMod,
        fmYNorm: waveSel.value === "fm" ? 1 - ny : null,
      };
      applyPressure(pressure, t);
    }

    function pointer(e) {
      if (!built) return;
      const rect = pad.getBoundingClientRect();
      const nx = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      const ny = Math.max(0, Math.min(1, (e.clientY - rect.top) / rect.height));
      if (voice?.modGain && waveSel.value === "fm") voice.fmYNorm = 1 - ny;
      const { value: pressure, source } = readPressure(e);
      cursor.style.left = `${nx * 100}%`;
      cursor.style.top = `${ny * 100}%`;
      cursor.style.transform = `scale(${0.65 + pressure * 0.95})`;
      updatePressureUI(pressure, source);
      const freq = midiToFreq(48 + nx * 24);
      const cutoff = 200 + (1 - ny) * 8000;
      const t = ctx.currentTime;
      if (!voice) startVoice(freq, cutoff, pressure, ny);
      else {
        voice.osc.frequency.setTargetAtTime(freq, t, 0.02);
        if (voice.modOsc) {
          voice.modOsc.frequency.setTargetAtTime(freq * 1.5, t, 0.02);
          voice.baseMod = freq * 0.8;
        }
        voice.filter.frequency.setTargetAtTime(cutoff, t, 0.02);
        applyPressure(pressure, t);
      }
    }

    pad.addEventListener("pointerdown", async (e) => {
      e.preventDefault();
      await startAudio(!built ? buildAudio : undefined);
      activePointer = e.pointerId;
      pad.setPointerCapture(e.pointerId);
      pad.classList.add("active");
      pointer(e);
    });

    pad.addEventListener("pointermove", (e) => {
      if (!built || e.pointerId !== activePointer) return;
      e.preventDefault();
      pointer(e);
    });

    const stop = (e) => {
      if (e.pointerId !== activePointer) return;
      pad.classList.remove("active");
      cursor.style.transform = "scale(1)";
      document.getElementById("pressOut").textContent = "—";
      document.getElementById("pressSrcChip").hidden = true;
      stopVoice();
      activePointer = null;
    };

    pad.addEventListener("pointerup", stop);
    pad.addEventListener("pointercancel", stop);
    pad.addEventListener("lostpointercapture", stop);

    waveSel.addEventListener("change", () => {
      if (voice && pad.classList.contains("active")) stopVoice();
    });
  </script>
</body>
</html>
