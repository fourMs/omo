<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f14" />
  <title>Feedback Flute — OMO</title>
  <link rel="stylesheet" href="../../shared/ui.css" />
</head>
<body class="app-shell feedback-flute-app">
  <header class="app-header">
    <a class="back-link" href="../../">←</a>
    <h1>Feedback Flute</h1>
  </header>
  <div class="learn-panel panel" id="learnPanel">
    <h2>Feedback flute</h2>
    <p>Turn <strong>Audio on</strong> and allow the mic. <strong>Hold</strong> the pitch strip — mic and speaker form a resonant whistle loop. Slide <strong>up/down</strong> for pitch; release to silence.</p>
  </div>
  <p class="status-bar" id="status">Turn Audio on, then hold pitch strip</p>
  <div class="main-stage feedback-flute-stage">
    <div
      id="pitchSlider"
      class="pitch-slider-1d"
      role="slider"
      aria-label="Pitch"
      aria-valuemin="400"
      aria-valuemax="1600"
      tabindex="0"
    >
      <span class="pitch-slider-label pitch-slider-label--high" aria-hidden="true">High</span>
      <div class="pitch-slider-track" aria-hidden="true"></div>
      <div class="pitch-slider-thumb" id="thumb" aria-hidden="true"></div>
      <span class="pitch-slider-label pitch-slider-label--low" aria-hidden="true">Low</span>
    </div>
  </div>
  <script type="module">
    import { bindLearn, registerAudioBoot, setStatus, startAudio } from "../../shared/app.js";
    import { connectMicAnalyser, createMasterBus, getMicStream, primeMicStream } from "../../shared/audio.js";

    bindLearn();

    const slider = document.getElementById("pitchSlider");
    const thumb = document.getElementById("thumb");
    const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

    let ctx, master, bp, loopFb, outGain, micIn, built = false;
    let micStream = null;
    let analyser = null;
    let buf = null;
    let holding = false;
    let activeId = null;
    let loopOn = false;

    function build(c) {
      ctx = c;
      ({ master } = createMasterBus(c, 0.52));
      micIn = ctx.createGain();
      micIn.gain.value = 1.6;
      bp = ctx.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.value = 900;
      bp.Q.value = 11;
      loopFb = ctx.createGain();
      loopFb.gain.value = 0;
      outGain = ctx.createGain();
      outGain.gain.value = 0;
      micIn.connect(bp);
      bp.connect(loopFb);
      loopFb.connect(bp);
      bp.connect(outGain);
      outGain.connect(master);
      built = true;
    }

    registerAudioBoot(build, { mic: true });

    async function ensureMic() {
      if (micStream) return true;
      try {
        micStream = await getMicStream();
      } catch {
        setStatus("status", "Mic blocked — allow microphone", "warn");
        return false;
      }
      if (!analyser) {
        analyser = ctx.createAnalyser();
        analyser.fftSize = 256;
        connectMicAnalyser(ctx, micStream, analyser, { inputGain: 1.4 });
        buf = new Float32Array(analyser.fftSize);
        const micSrc = ctx.createMediaStreamSource(micStream);
        micSrc.connect(micIn);
      }
      return true;
    }

    function exciteResonator() {
      if (!ctx || !bp) return;
      const n = ctx.createBufferSource();
      const len = Math.floor(ctx.sampleRate * 0.06);
      const b = ctx.createBuffer(1, len, ctx.sampleRate);
      const d = b.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
      const g = ctx.createGain();
      g.gain.value = 0.35;
      n.buffer = b;
      n.connect(g);
      g.connect(bp);
      n.start();
      n.stop(ctx.currentTime + 0.07);
    }

    function readRms() {
      if (!analyser || !buf) return 0;
      analyser.getFloatTimeDomainData(buf);
      let s = 0;
      for (let i = 0; i < buf.length; i++) s += buf[i] * buf[i];
      return Math.sqrt(s / buf.length);
    }

    function setPitchFromY(clientY) {
      if (!ctx || !bp) return;
      const r = slider.getBoundingClientRect();
      const ny = clamp((clientY - r.top) / r.height, 0, 1);
      const hz = 400 + 1200 * (1 - ny);
      bp.frequency.setTargetAtTime(hz, ctx.currentTime, 0.03);
      thumb.style.top = `${ny * 100}%`;
      slider.setAttribute("aria-valuenow", String(Math.round(hz)));
    }

    function tick() {
      if (!ctx || !built || !loopFb) return;
      const rms = readRms();
      const t = ctx.currentTime;
      if (holding) {
        const loud = rms > 0.12;
        const loop = loud ? clamp(0.9 - rms * 1.5, 0.82, 0.94) : clamp(0.9 + rms * 3, 0.88, 0.97);
        const out = clamp(0.38 + rms * 1.2, 0.32, 0.58);
        loopFb.gain.setTargetAtTime(loop, t, 0.04);
        outGain.gain.setTargetAtTime(out, t, 0.04);
      } else {
        loopFb.gain.setTargetAtTime(0, t, 0.06);
        outGain.gain.setTargetAtTime(0, t, 0.04);
      }
      requestAnimationFrame(tick);
    }

    function startLoop() {
      if (loopOn) return;
      loopOn = true;
      tick();
    }

    async function arm(e) {
      e.preventDefault();
      primeMicStream();
      await startAudio(!built ? build : undefined);
      if (!built || !ctx) return;
      if (!(await ensureMic())) return;
      startLoop();
      holding = true;
      activeId = e.pointerId;
      slider.setPointerCapture(activeId);
      slider.classList.add("active");
      thumb.classList.add("active");
      setPitchFromY(e.clientY);
      exciteResonator();
      setStatus("status", "Hold steady — slide for pitch", "ok");
    }

    function release(e) {
      if (e.pointerId !== activeId) return;
      holding = false;
      activeId = null;
      slider.classList.remove("active");
      thumb.classList.remove("active");
      if (!ctx || !loopFb) return;
      const t = ctx.currentTime;
      loopFb.gain.setTargetAtTime(0, t, 0.05);
      outGain.gain.setTargetAtTime(0, t, 0.04);
    }

    slider.addEventListener("pointerdown", (e) => void arm(e));
    slider.addEventListener("pointermove", (e) => {
      if (!holding || e.pointerId !== activeId) return;
      setPitchFromY(e.clientY);
    });
    slider.addEventListener("pointerup", release);
    slider.addEventListener("pointercancel", release);
    slider.addEventListener("lostpointercapture", release);
    thumb.style.top = "50%";
    slider.setAttribute("aria-valuenow", "1000");
  </script>
</body>
</html>
