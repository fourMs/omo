<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f14" />
  <title>Feedback Flute — OMO</title>
  <link rel="stylesheet" href="../../shared/ui.css" />
</head>
<body class="app-shell">
  <header class="app-header">
    <a class="back-link" href="../../">←</a>
    <h1>Feedback Flute</h1>
  </header>
  <div class="learn-panel panel" id="learnPanel">
    <h2>Feedback flute</h2>
    <p>Turn <strong>Audio on</strong> and allow the mic. <strong>Hold</strong> the pad — mic and speaker form a resonant whistle loop. Slide <strong>up/down</strong> for pitch; release to silence.</p>
  </div>
  <p class="status-bar" id="status">Turn Audio on, then hold pad</p>
  <div class="main-stage">
    <div id="pad" class="stage-fill play-grid"><div class="touch-dot" id="dot"></div></div>
  </div>
  <script type="module">
    import { bindLearn, registerAudioBoot, setStatus, startAudio } from "../../shared/app.js";
    import { connectMicAnalyser, createMasterBus, getMicStream, primeMicStream } from "../../shared/audio.js";

    bindLearn();

    const pad = document.getElementById("pad");
    const dot = document.getElementById("dot");
    const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

    let ctx, master, bp, fb, built = false;
    let micStream = null;
    let micSrc = null;
    let analyser = null;
    let buf = null;
    let holding = false;
    let activeId = null;
    let loopOn = false;

    function build(c) {
      ctx = c;
      ({ master } = createMasterBus(c, 0.35));
      bp = ctx.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.value = 900;
      bp.Q.value = 18;
      fb = ctx.createGain();
      fb.gain.value = 0;
      bp.connect(fb);
      fb.connect(bp);
      fb.connect(master);
      built = true;
    }

    registerAudioBoot(build, { mic: true });

    async function ensureMic() {
      if (micStream) return true;
      try {
        micStream = await getMicStream();
      } catch {
        setStatus("status", "Mic blocked — allow microphone", "warn");
        return false;
      }
      if (!micSrc) {
        micSrc = ctx.createMediaStreamSource(micStream);
        micSrc.connect(bp);
      }
      if (!analyser) {
        analyser = ctx.createAnalyser();
        analyser.fftSize = 256;
        connectMicAnalyser(ctx, micStream, analyser, { inputGain: 1.3 });
        buf = new Float32Array(analyser.fftSize);
      }
      return true;
    }

    function readRms() {
      if (!analyser || !buf) return 0;
      analyser.getFloatTimeDomainData(buf);
      let s = 0;
      for (let i = 0; i < buf.length; i++) s += buf[i] * buf[i];
      return Math.sqrt(s / buf.length);
    }

    function setPitchFromY(clientY) {
      if (!ctx || !bp) return;
      const r = pad.getBoundingClientRect();
      const ny = clamp((clientY - r.top) / r.height, 0, 1);
      bp.frequency.setTargetAtTime(400 + 1200 * (1 - ny), ctx.currentTime, 0.03);
      dot.style.top = `${ny * 100}%`;
    }

    function tick() {
      if (!ctx || !built || !fb) return;
      const rms = readRms();
      const t = ctx.currentTime;
      const target = holding ? clamp(0.1 + rms * 8, 0.1, 0.32) : 0;
      fb.gain.setTargetAtTime(target, t, 0.05);
      requestAnimationFrame(tick);
    }

    function startLoop() {
      if (loopOn) return;
      loopOn = true;
      tick();
    }

    async function arm(e) {
      e.preventDefault();
      primeMicStream();
      await startAudio(!built ? build : undefined);
      if (!built || !ctx) return;
      if (!(await ensureMic())) return;
      startLoop();
      holding = true;
      activeId = e.pointerId;
      pad.setPointerCapture(activeId);
      pad.classList.add("active");
      dot.style.opacity = "1";
      setPitchFromY(e.clientY);
      setStatus("status", "Hold steady — slide for pitch", "ok");
    }

    function release(e) {
      if (e.pointerId !== activeId) return;
      holding = false;
      activeId = null;
      pad.classList.remove("active");
      dot.style.opacity = "0";
      if (ctx && fb) fb.gain.setTargetAtTime(0, ctx.currentTime, 0.04);
    }

    pad.addEventListener("pointerdown", (e) => void arm(e));
    pad.addEventListener("pointermove", (e) => {
      if (!holding || e.pointerId !== activeId) return;
      setPitchFromY(e.clientY);
    });
    pad.addEventListener("pointerup", release);
    pad.addEventListener("pointercancel", release);
    pad.addEventListener("lostpointercapture", release);
  </script>
</body>
</html>
