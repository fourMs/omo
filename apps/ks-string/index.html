<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f14" />
  <title>Ks String — OMO</title>
  <link rel="stylesheet" href="../../shared/ui.css" />
</head>
<body class="app-shell">
  <header class="app-header">
    <a class="back-link" href="../../">←</a>
    <h1>Ks String</h1>
  </header>
  <div class="learn-panel panel" id="learnPanel">
    <h2>Karplus–Strong</h2>
    <p>Turn <strong>Audio on</strong>, then tap to pluck. <strong>X</strong> = pitch, <strong>Y</strong> = strength. Tilt = damping.</p>
    <p><strong>Stage</strong> = lower, longer wire · <strong>Pocket</strong> = wider pitch range (former Pocket Pluck).</p>
  </div>
  <div class="control-row" style="margin:0 0.35rem">
    <label for="rangeSelect">Range</label>
    <select id="rangeSelect">
      <option value="stage">Stage</option>
      <option value="pocket">Pocket</option>
    </select>
  </div>
  <div class="main-stage">
    <div id="pad" class="stage-fill play-grid"></div>
  </div>
  <div class="readout-row">
    <p class="value-chip">Pitch <strong id="freqEl">110</strong> Hz</p>
    <p class="value-chip">Pluck <strong id="pluckEl">0.5</strong></p>
    <p class="value-chip">Damp <strong id="dampEl">4000</strong> Hz</p>
    <label class="slide-toggle value-chip">
      <input type="checkbox" id="reverbOn" checked />
      Reverb
    </label>
  </div>
  <script type="module">
    import { bindLearn, registerAudioBoot, startAudio } from "../../shared/app.js";
    import { createMasterBus } from "../../shared/audio.js";
    import { createKSReverb, createKSPool, karplusPluck } from "../../shared/ks.js";
    import { enableSensors, onOrientation } from "../../shared/sensors.js";

    bindLearn();
    const pad = document.getElementById("pad");
    let ctx, master, reverbBus, built = false;
    let tiltReady = false;
    let currentDamp = 4000;
    let activeId = null;
    const pool = createKSPool(3);

    const rangeSelect = document.getElementById("rangeSelect");
    let range = new URLSearchParams(location.search).get("range") === "pocket" ? "pocket" : "stage";
    if (range === "pocket") rangeSelect.value = "pocket";

    const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
    const mapX = (nx) =>
      range === "pocket" ? 55 * Math.pow(880 / 55, nx) : 40 * Math.pow(300 / 40, nx);

    rangeSelect.addEventListener("change", () => {
      range = rangeSelect.value;
      const u = new URL(location.href);
      if (range === "pocket") u.searchParams.set("range", "pocket");
      else u.searchParams.delete("range");
      history.replaceState({}, "", u);
    });

    function buildAudio(c) {
      if (built) return;
      ctx = c;
      ({ master } = createMasterBus(c, 0.52));
      reverbBus = createKSReverb(c, master, 0.26);
      built = true;
    }

    registerAudioBoot(buildAudio);

    async function enableTilt() {
      if (tiltReady) return;
      if (await enableSensors()) {
        tiltReady = true;
        onOrientation((o) => {
          const t = clamp(Math.sqrt((o.beta || 0) ** 2 + (o.gamma || 0) ** 2) / 90, 0, 1);
          currentDamp = 8000 * (300 / 8000) ** t;
          document.getElementById("dampEl").textContent = currentDamp.toFixed(0);
        });
      }
    }

    function ripple(x, y) {
      const el = document.createElement("div");
      el.className = "pluck-ripple";
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      pad.appendChild(el);
      setTimeout(() => el.remove(), 600);
    }

    function trigger(x, y) {
      if (!built) return;
      const r = pad.getBoundingClientRect();
      if (r.width <= 0 || r.height <= 0) return;
      const nx = clamp(x / r.width, 0, 1);
      const ny = clamp(y / r.height, 0, 1);
      const freq = mapX(nx);
      const strength = 0.1 + (1 - ny) * 0.5;
      const dampHz = currentDamp;
      const useRev = document.getElementById("reverbOn").checked;
      karplusPluck(ctx, master, pool, freq, {
        strength,
        dampHz,
        level: 0.22 + strength * 0.2,
        feedback: Math.max(0.72, 0.84 - dampHz / 11000),
        decaySec: 1.7,
        reverbBus: useRev ? reverbBus : null,
        reverbSend: useRev ? 0.34 : 0,
      });
      document.getElementById("freqEl").textContent = freq.toFixed(0);
      document.getElementById("pluckEl").textContent = strength.toFixed(2);
      ripple(x, y);
    }

    pad.addEventListener("pointerdown", async (ev) => {
      ev.preventDefault();
      await startAudio(!built ? buildAudio : undefined);
      if (!built) return;
      void enableTilt();
      activeId = ev.pointerId;
      pad.setPointerCapture(activeId);
      pad.classList.add("active");
      const r = pad.getBoundingClientRect();
      trigger(
        clamp(ev.clientX - r.left, 0, r.width),
        clamp(ev.clientY - r.top, 0, r.height)
      );
    });

    pad.addEventListener("pointermove", (ev) => {
      if (ev.pointerId !== activeId) return;
      const r = pad.getBoundingClientRect();
      const x = clamp(ev.clientX - r.left, 0, r.width);
      const y = clamp(ev.clientY - r.top, 0, r.height);
      const nx = x / r.width;
      document.getElementById("freqEl").textContent = mapX(nx).toFixed(0);
      document.getElementById("pluckEl").textContent = (0.1 + (1 - y / r.height) * 0.5).toFixed(2);
    });

    const stop = (ev) => {
      if (ev.pointerId !== activeId) return;
      activeId = null;
      pad.classList.remove("active");
    };

    pad.addEventListener("pointerup", stop);
    pad.addEventListener("pointercancel", stop);
    pad.addEventListener("lostpointercapture", stop);
  </script>
</body>
</html>
