<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f14" />
  <title>Bit Crush Pad — OMO</title>
  <link rel="stylesheet" href="../../shared/ui.css" />
</head>
<body class="app-shell">
  <header class="app-header">
    <a class="back-link" href="../../">←</a>
    <h1>Bit Crush Pad</h1>
  </header>
  <div class="learn-panel panel" id="learnPanel">
    <h2>Bit crush pad</h2>
    <p>Turn <strong>Audio on</strong>, allow <strong>motion</strong> if asked. <strong>Hold</strong> the pad for a crunchy square tone. <strong>Shake</strong> the phone or use a slow network — more bit reduction and filtering.</p>
  </div>
  <div class="readout-row">
    <p class="value-chip">Crush <strong id="crushOut">—</strong></p>
    <p class="value-chip">Net <strong id="netOut">—</strong></p>
  </div>
  <div class="main-stage">
    <div id="pad" class="stage-fill play-grid"><div class="touch-dot" id="dot"></div></div>
  </div>
  <script type="module">
    import { bindLearn, startAudio } from "../../shared/app.js";
    import { createMasterBus } from "../../shared/audio.js";
    import { createBitCrushChain, networkCrushAmount } from "../../shared/bit-crush.js";
    import { enableSensors, onMotion, primeSensors } from "../../shared/sensors.js";

    bindLearn();
    const pad = document.getElementById("pad");
    const dot = document.getElementById("dot");
    const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
    const SENSOR_OPTS = { needMotion: true, needOrientation: false };

    let ctx, master, osc, amp, crush, built = false;
    let holding = false;
    let activeId = null;
    let shakeCrush = 0;
    let lastAccel = { x: 0, y: 0, z: 0 };
    let motionPrimed = false;
    const netBase = networkCrushAmount();

    function totalCrush(ny = 0.5) {
      return clamp(netBase * 0.45 + shakeCrush * 0.45 + (1 - ny) * 0.25, 0, 1);
    }

    function refreshCrush(ny) {
      const c = totalCrush(ny);
      document.getElementById("crushOut").textContent = `${(c * 100) | 0}%`;
      const conn = navigator.connection;
      document.getElementById("netOut").textContent = conn?.effectiveType || "—";
      if (crush && ctx) crush.setCrush(c, ctx.currentTime);
    }

    async function enableMotion() {
      if (await enableSensors(SENSOR_OPTS)) {
        onMotion(({ x, y, z }) => {
          if (!holding) return;
          if (!motionPrimed) {
            lastAccel = { x, y, z };
            motionPrimed = true;
            return;
          }
          const jerk = Math.hypot(x - lastAccel.x, y - lastAccel.y, z - lastAccel.z);
          lastAccel = { x, y, z };
          shakeCrush = Math.min(1, shakeCrush * 0.85 + Math.min(1, jerk / 2.2) * 0.15);
          refreshCrush();
        });
      }
    }

    function buildAudio(c) {
      ctx = c;
      ({ master } = createMasterBus(c, 0.52));
      crush = createBitCrushChain(ctx, master);
      osc = ctx.createOscillator();
      amp = ctx.createGain();
      osc.type = "square";
      osc.frequency.value = 130;
      amp.gain.value = 0;
      osc.connect(amp);
      amp.connect(crush.input);
      osc.start();
      built = true;
      void enableMotion();
      refreshCrush(0.5);
    }

    pad.addEventListener("pointerdown", async (e) => {
      e.preventDefault();
      primeSensors(SENSOR_OPTS);
      await startAudio(!built ? buildAudio : undefined);
      if (!built) return;
      activeId = e.pointerId;
      pad.setPointerCapture(activeId);
      pad.classList.add("active");
      holding = true;
      motionPrimed = false;
      shakeCrush = 0;
      const r = pad.getBoundingClientRect();
      const ny = clamp((e.clientY - r.top) / r.height, 0, 1);
      const nx = clamp((e.clientX - r.left) / r.width, 0, 1);
      osc.frequency.setTargetAtTime(80 * Math.pow(4, nx), ctx.currentTime, 0.02);
      amp.gain.setTargetAtTime(0.32, ctx.currentTime, 0.02);
      dot.style.left = `${nx * 100}%`;
      dot.style.top = `${ny * 100}%`;
      refreshCrush(ny);
    });

    pad.addEventListener("pointermove", (e) => {
      if (e.pointerId !== activeId) return;
      const r = pad.getBoundingClientRect();
      const ny = clamp((e.clientY - r.top) / r.height, 0, 1);
      const nx = clamp((e.clientX - r.left) / r.width, 0, 1);
      osc.frequency.setTargetAtTime(80 * Math.pow(4, nx), ctx.currentTime, 0.03);
      refreshCrush(ny);
      dot.style.left = `${nx * 100}%`;
      dot.style.top = `${ny * 100}%`;
    });

    const stop = (e) => {
      if (e.pointerId !== activeId) return;
      holding = false;
      activeId = null;
      pad.classList.remove("active");
      amp.gain.setTargetAtTime(0, ctx.currentTime, 0.06);
      shakeCrush = 0;
    };
    pad.addEventListener("pointerup", stop);
    pad.addEventListener("pointercancel", stop);
    pad.addEventListener("lostpointercapture", stop);
  </script>
</body>
</html>
