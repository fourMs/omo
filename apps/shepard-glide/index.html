<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f14" />
  <title>Shepard Glide — OMO</title>
  <link rel="stylesheet" href="../../shared/ui.css" />
</head>
<body class="app-shell shepard-glide-app">
  <header class="app-header">
    <a class="back-link" href="../../">←</a>
    <h1>Shepard Glide</h1>
  </header>
  <div class="learn-panel panel" id="learnPanel">
    <h2>Shepard tone</h2>
    <p>Turn <strong>Audio on</strong>, allow <strong>motion</strong> if asked. <strong>Hold</strong> the pad — the glissando keeps going until you lift your finger. <strong>Tilt forward/back</strong> for speed; lean the other way to reverse.</p>
  </div>
  <div class="control-row shepard-live" aria-live="polite" aria-label="Glide">
    <label>Rate</label>
    <span><strong id="rateOut">—</strong></span>
    <label>Dir</label>
    <span><strong id="dirOut">up</strong></span>
  </div>
  <div class="main-stage">
    <div id="pad" class="stage-fill play-grid shepard-pad"></div>
  </div>
  <script type="module">
    import { bindLearn, registerAudioBoot, startAudio } from "../../shared/app.js";
    import { createMasterBus, getAudioContext } from "../../shared/audio.js";
    import { createShepardTone } from "../../shared/shepard.js";
    import { enableSensors, onOrientation, primeSensors } from "../../shared/sensors.js";

    bindLearn();
    const pad = document.getElementById("pad");
    const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
    const SENSOR_OPTS = { needMotion: false, needOrientation: true };

    let ctx, master, shepard, built = false;
    let holdCount = 0;
    let activeId = null;

    function applyTilt(beta, gamma) {
      if (!shepard || holdCount < 1) return;
      const forward = clamp((beta ?? 0) / 55, -1, 1);
      const rate = 0.06 + Math.abs(forward) * 0.35;
      shepard.setRate(rate);
      shepard.setDirection(forward >= 0 ? 1 : -1);
      document.getElementById("rateOut").textContent = rate.toFixed(2);
      document.getElementById("dirOut").textContent = forward >= 0 ? "up" : "down";
    }

    function buildAudio(c) {
      ctx = c;
      ({ master } = createMasterBus(c, 0.42));
      shepard = createShepardTone(ctx, master);
      built = true;
      void enableSensors(SENSOR_OPTS).then((ok) => {
        if (ok) onOrientation((o) => holdCount > 0 && applyTilt(o.beta, o.gamma));
      });
      applyTilt(20, 0);
    }

    registerAudioBoot(buildAudio);

    async function ensureRunning() {
      if (!built) await startAudio(buildAudio);
      const ac = ctx || getAudioContext();
      if (ac.state === "suspended") await ac.resume();
      if (!shepard?.isRunning()) {
        shepard.start();
        shepard.setLevel(1);
      }
    }

    function releaseHold(pointerId) {
      if (pointerId != null && activeId != null && pointerId !== activeId) return;
      holdCount = Math.max(0, holdCount - 1);
      activeId = null;
      if (holdCount === 0) {
        pad.classList.remove("active");
        shepard?.stop();
      }
    }

    primeSensors(SENSOR_OPTS);

    pad.addEventListener(
      "pointerdown",
      (e) => {
        e.preventDefault();
        holdCount += 1;
        activeId = e.pointerId;
        pad.classList.add("active");
        void ensureRunning();
      },
      { passive: false }
    );

    pad.addEventListener("pointerup", (e) => {
      if (e.pointerId !== activeId) return;
      releaseHold(e.pointerId);
    });

    pad.addEventListener("pointercancel", (e) => {
      if (e.pointerId !== activeId) return;
      if (e.buttons !== 0) return;
      releaseHold(e.pointerId);
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && holdCount > 0) void ensureRunning();
    });
  </script>
</body>
</html>
