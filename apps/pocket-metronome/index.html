<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f14" />
  <title>Pocket Metronome — OMO</title>
  <link rel="stylesheet" href="../../shared/ui.css" />
</head>
<body class="app-shell pocket-pulse-app">
  <header class="app-header">
    <a class="back-link" href="../../">←</a>
    <h1>Pocket Metronome</h1>
  </header>
  <div class="learn-panel panel" id="learnPanel">
    <h2>Pocket metronome</h2>
    <p>Turn <strong>Audio on</strong>, allow motion if asked, then <strong>hold</strong> the pad to hear a steady pulse.</p>
    <p>Walk, tap your pocket, or shake — acceleration peaks <strong>duck</strong> the beat like a sidechain.</p>
  </div>
  <p class="status-bar" id="status">Hold pad to start pulse</p>
  <div class="main-stage">
    <div id="pad" class="stage-fill play-grid">
      <div class="touch-dot" id="dot"></div>
    </div>
  </div>
  <script type="module">
    import { bindLearn, registerAudioBoot, setStatus, startAudio } from "../../shared/app.js";
    import { createMasterBus } from "../../shared/audio.js";
    import { enableSensors, onMotion, primeSensors } from "../../shared/sensors.js";

    bindLearn();

    const pad = document.getElementById("pad");
    const dot = document.getElementById("dot");
    const SENSOR_OPTS = { needMotion: true, needOrientation: false };
    const PULSE_MS = 500;
    const HOLD_LEVEL = 0.22;
    const DUCK_LEVEL = 0.035;

    let ctx, master, toneGain, built = false;
    let holding = false;
    let activePointer = null;
    let pulseTimer = null;
    let sensorsReady = false;
    let lastStep = 0;

    function build(c) {
      if (built) return;
      ctx = c;
      ({ master } = createMasterBus(c, 0.55));
      toneGain = ctx.createGain();
      toneGain.gain.value = 0;
      toneGain.connect(master);
      built = true;
    }

    registerAudioBoot(build);

    function playClick() {
      if (!ctx || !holding) return;
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const env = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(920, t);
      osc.frequency.exponentialRampToValueAtTime(640, t + 0.04);
      env.gain.setValueAtTime(0.001, t);
      env.gain.exponentialRampToValueAtTime(0.2, t + 0.004);
      env.gain.exponentialRampToValueAtTime(0.001, t + 0.055);
      osc.connect(env);
      env.connect(toneGain);
      osc.start(t);
      osc.stop(t + 0.06);
    }

    function startPulse() {
      stopPulse();
      toneGain.gain.setTargetAtTime(HOLD_LEVEL, ctx.currentTime, 0.04);
      playClick();
      pulseTimer = setInterval(playClick, PULSE_MS);
    }

    function stopPulse() {
      if (pulseTimer) {
        clearInterval(pulseTimer);
        pulseTimer = null;
      }
      if (ctx && toneGain) {
        toneGain.gain.cancelScheduledValues(ctx.currentTime);
        toneGain.gain.setTargetAtTime(0, ctx.currentTime, 0.06);
      }
    }

    async function initSensors() {
      if (sensorsReady) return true;
      primeSensors(SENSOR_OPTS);
      const ok = await enableSensors(SENSOR_OPTS);
      if (!ok) {
        setStatus("status", "Allow motion for pocket ducking", "warn");
        return false;
      }
      onMotion(({ x, y, z }) => {
        if (!holding || !ctx) return;
        const mag = Math.sqrt(x * x + y * y + z * z);
        const now = performance.now();
        if (mag > 11 && now - lastStep > 280) {
          lastStep = now;
          const t = ctx.currentTime;
          toneGain.gain.cancelScheduledValues(t);
          toneGain.gain.setTargetAtTime(DUCK_LEVEL, t, 0.012);
          toneGain.gain.setTargetAtTime(HOLD_LEVEL, t + 0.09, 0.07);
          setStatus("status", "Step duck · hold for pulse", "ok");
        }
      });
      sensorsReady = true;
      return true;
    }

    function placeDot(e) {
      const r = pad.getBoundingClientRect();
      dot.style.left = `${Math.min(100, Math.max(0, ((e.clientX - r.left) / r.width) * 100))}%`;
      dot.style.top = `${Math.min(100, Math.max(0, ((e.clientY - r.top) / r.height) * 100))}%`;
    }

    pad.addEventListener("pointerdown", async (e) => {
      e.preventDefault();
      await startAudio(!built ? build : undefined);
      if (!built) return;
      await initSensors();
      holding = true;
      activePointer = e.pointerId;
      pad.setPointerCapture(e.pointerId);
      pad.classList.add("active");
      placeDot(e);
      startPulse();
      setStatus("status", "Pulse on · walk or tap to duck", "ok");
    });

    pad.addEventListener("pointermove", (e) => {
      if (!holding || e.pointerId !== activePointer) return;
      placeDot(e);
    });

    const release = (e) => {
      if (e.pointerId !== activePointer) return;
      holding = false;
      activePointer = null;
      pad.classList.remove("active");
      stopPulse();
      setStatus("status", "Hold pad to start pulse", "");
    };

    pad.addEventListener("pointerup", release);
    pad.addEventListener("pointercancel", release);
    pad.addEventListener("lostpointercapture", release);
  </script>
</body>
</html>
