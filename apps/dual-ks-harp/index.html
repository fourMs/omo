<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f14" />
  <title>Dual KS Harp — OMO</title>
  <link rel="stylesheet" href="../../shared/ui.css" />
  
</head>
<body class="app-shell">
  <header class="app-header">
    <a class="back-link" href="../../">←</a>
    <h1>Dual KS Harp</h1>
  </header>
  <div class="learn-panel panel" id="learnPanel"><h2>Dual KS harp</h2><p>Two-finger plucks — separate delay lines per touch.</p></div>
  <div class="main-stage">
    <div id="pad" class="stage-fill play-grid"><div class="touch-dot" id="dot"></div></div>
  </div>
  <script type="module">

import { bindLearn, startAudio } from "../../shared/app.js";
import { createMasterBus } from "../../shared/audio.js";
bindLearn();
const pad=document.getElementById("pad");
const dot=document.getElementById("dot");
const clamp=(v,lo,hi)=>Math.min(hi,Math.max(lo,v));
let ctx,master,built=false,holding=false,activeId=null;

import { createKSPool, karplusPluck } from "../../shared/ks.js";
let pool;
function build(c){ctx=c;({master}=createMasterBus(c,0.55));pool=createKSPool(8);built=true;}
function pluckAt(e){const r=pad.getBoundingClientRect();const nx=clamp((e.clientX-r.left)/r.width,0,1);karplusPluck(ctx,master,pool,110*Math.pow(4,nx),{strength:0.5,level:0.3});}
pad.addEventListener("pointerdown",async e=>{e.preventDefault();await startAudio(!built?build:undefined);pluckAt(e);pad.classList.add("active");});
  </script>
</body>
</html>
