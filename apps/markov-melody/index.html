<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f14" />
  <title>Markov Melody — OMO</title>
  <link rel="stylesheet" href="../../shared/ui.css" />
</head>
<body class="app-shell markov-melody-app">
  <header class="app-header">
    <a class="back-link" href="../../">←</a>
    <h1>Markov Melody</h1>
  </header>
  <div class="learn-panel panel" id="learnPanel">
    <h2>Markov melody</h2>
    <p>Turn <strong>Audio on</strong> (top right). Pick a <strong>scale</strong>, then play the <strong>keyboard</strong> — each tap teaches a 2-note-memory chain.</p>
    <p><strong>Auto play</strong> continues in your style. Highlighted keys are in the chosen scale.</p>
  </div>
  <div class="app-toolbar markov-toolbar">
    <button type="button" class="btn btn-sm btn-play" id="autoBtn">Auto play</button>
    <button type="button" class="btn-secondary btn btn-sm" id="clearBtn">Clear learn</button>
    <label for="scalePick">Scale</label>
    <select id="scalePick" class="harm-select">
      <option value="pentatonic">Pentatonic</option>
      <option value="major" selected>Major</option>
      <option value="minor">Natural minor</option>
      <option value="chromatic">Chromatic</option>
    </select>
    <label for="bpm">BPM <input type="range" id="bpm" min="40" max="160" value="96" /></label>
    <span id="bpmVal">96</span>
  </div>
  <p class="status-bar" id="status">Turn Audio on · tap keys to train</p>
  <div class="readout-row">
    <p class="value-chip">Learned <strong id="learnOut">0</strong></p>
    <p class="value-chip">Last <strong id="noteOut">—</strong></p>
  </div>
  <div class="main-stage markov-stage">
    <div class="keyboard-scroll markov-keyboard-scroll">
      <div class="keyboard-wrap" id="keyboard"></div>
    </div>
  </div>
  <script type="module">
    import { bindLearn, registerAudioBoot, setStatus, startAudio } from "../../shared/app.js";
    import { createMasterBus, midiToFreq } from "../../shared/audio.js";
    import {
      MARKOV_SCALES,
      createMarkovMelody,
      degreeToMidi,
      labelForDegree,
      midiToDegree,
    } from "../../shared/markov-melody.js";

    bindLearn();

    const NOTE_NAMES = ["C", "C♯", "D", "D♯", "E", "F", "F♯", "G", "G♯", "A", "A♯", "B"];
    const BLACK_SEMIS = new Set([1, 3, 6, 8, 10]);
    const ROOT_MIDI = 60;
    const KEYBOARD_OCTAVES = 2;
    const WHITE_W = 28;
    const BLACK_NUDGE = 20;

    let markov = createMarkovMelody({ intervals: MARKOV_SCALES.major.intervals, octaves: KEYBOARD_OCTAVES });
    let intervals = markov.getIntervals();
    let ctx, master, built = false;
    let autoOn = false;
    let nextTick = 0;
    let raf = 0;
    const keyEls = new Map();

    function blackKeyLeft(semi) {
      const inOct = semi % 12;
      const oct = Math.floor(semi / 12);
      const whiteBefore = { 1: 0, 3: 1, 6: 3, 8: 4, 10: 5 }[inOct];
      if (whiteBefore === undefined) return 0;
      return oct * 7 * WHITE_W + whiteBefore * WHITE_W + BLACK_NUDGE;
    }

    function playMidi(midi, when) {
      if (!ctx || !master) return;
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = "triangle";
      osc.frequency.value = midiToFreq(midi);
      g.gain.setValueAtTime(0.001, when);
      g.gain.exponentialRampToValueAtTime(0.32, when + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, when + 0.35);
      osc.connect(g);
      g.connect(master);
      osc.start(when);
      osc.stop(when + 0.4);
    }

    function playDegree(deg, when) {
      const midi = degreeToMidi(deg, ROOT_MIDI, intervals);
      playMidi(midi, when);
      document.getElementById("noteOut").textContent = labelForDegree(deg, ROOT_MIDI, intervals);
    }

    function buildAudio(c) {
      ctx = c;
      ({ master } = createMasterBus(c, 0.52));
      built = true;
    }

    registerAudioBoot(buildAudio);

    function semiInScale(semi) {
      return intervals.includes(((semi % 12) + 12) % 12);
    }

    function buildKeyboard() {
      const wrap = document.getElementById("keyboard");
      if (!wrap) return;
      wrap.innerHTML = "";
      keyEls.clear();
      const totalSemis = KEYBOARD_OCTAVES * 12 + 1;
      for (let s = 0; s < totalSemis; s++) {
        const inOct = s % 12;
        const oct = Math.floor(s / 12);
        const midi = ROOT_MIDI + s;
        const black = BLACK_SEMIS.has(inOct);
        const inScale = semiInScale(inOct);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = [
          "piano-key",
          black ? "black" : "white",
          inScale ? "markov-in-scale" : "markov-out-scale",
        ].join(" ");
        btn.dataset.midi = String(midi);
        if (black) btn.style.left = `${blackKeyLeft(s)}px`;
        const label = document.createElement("span");
        label.className = "key-note";
        label.textContent = `${NOTE_NAMES[inOct]}${4 + oct}`;
        btn.appendChild(label);
        btn.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          void onKey(midi, btn);
        });
        wrap.appendChild(btn);
        keyEls.set(midi, btn);
      }
    }

    function refreshKeyHighlights() {
      for (let s = 0; s < KEYBOARD_OCTAVES * 12 + 1; s++) {
        const inOct = s % 12;
        const midi = ROOT_MIDI + s;
        const btn = keyEls.get(midi);
        if (!btn) continue;
        const inScale = semiInScale(inOct);
        btn.classList.toggle("markov-in-scale", inScale);
        btn.classList.toggle("markov-out-scale", !inScale);
      }
    }

    async function onKey(midi, btn) {
      await startAudio(!built ? buildAudio : undefined);
      if (!ctx) return;
      const deg = midiToDegree(midi, ROOT_MIDI, intervals, KEYBOARD_OCTAVES);
      if (deg === null) {
        playMidi(midi, ctx.currentTime);
        setStatus("status", "Outside scale — not learned", "warn");
        return;
      }
      markov.observeDegree(deg);
      document.getElementById("learnOut").textContent = String(markov.trainingSize());
      playDegree(deg, ctx.currentTime);
      btn.classList.add("active");
      setTimeout(() => btn.classList.remove("active"), 120);
      setStatus("status", "Training…", "ok");
    }

    function scheduler() {
      if (!autoOn || !ctx) return;
      const now = ctx.currentTime;
      const bpm = +document.getElementById("bpm").value;
      const interval = 60 / bpm;
      while (nextTick <= now + 0.05) {
        const deg = markov.sample();
        playDegree(deg, nextTick);
        const midi = degreeToMidi(deg, ROOT_MIDI, intervals);
        keyEls.get(midi)?.classList.add("active");
        setTimeout(() => keyEls.get(midi)?.classList.remove("active"), 100);
        nextTick += interval;
      }
      raf = requestAnimationFrame(scheduler);
    }

    document.getElementById("scalePick").addEventListener("change", (e) => {
      const preset = MARKOV_SCALES[e.target.value];
      if (!preset) return;
      intervals = preset.intervals;
      markov.setIntervals(intervals);
      refreshKeyHighlights();
      document.getElementById("learnOut").textContent = "0";
      setStatus("status", `${preset.label} — tap keys to train`, "");
    });

    document.getElementById("bpm").addEventListener("input", (e) => {
      document.getElementById("bpmVal").textContent = e.target.value;
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      markov.reset();
      document.getElementById("learnOut").textContent = "0";
      setStatus("status", "Cleared — tap to train again", "");
    });

    document.getElementById("autoBtn").addEventListener("click", async () => {
      await startAudio(!built ? buildAudio : undefined);
      if (!ctx) return;
      autoOn = !autoOn;
      const btn = document.getElementById("autoBtn");
      btn.classList.toggle("active", autoOn);
      btn.textContent = autoOn ? "■ Stop" : "Auto play";
      if (autoOn) {
        if (markov.trainingSize() < 2) {
          setStatus("status", "Play at least 3 notes first", "warn");
        } else {
          setStatus("status", "Markov playing", "ok");
        }
        nextTick = ctx.currentTime + 0.08;
        cancelAnimationFrame(raf);
        scheduler();
      } else {
        cancelAnimationFrame(raf);
        setStatus("status", "Turn Audio on · tap keys to train", "");
      }
    });

    buildKeyboard();
  </script>
</body>
</html>
