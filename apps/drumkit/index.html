<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f14" />
  <title>Drumkit — OMO</title>
  <link rel="stylesheet" href="../../shared/ui.css" />
</head>
<body class="app-shell">
  <header class="app-header">
    <a class="back-link" href="../../">←</a>
    <h1>Drumkit</h1>
  </header>
  <div class="learn-panel panel" id="learnPanel">
    <h2>Drum Kit</h2>
    <p>Turn <strong>Audio on</strong>, then tap pads. Eight synthesized drums — kick, snare, hats, toms, clap, cowbell. Adjust volume below.</p>
  </div>
  <div class="control-row">
    <label for="volume">Volume</label>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7" />
  </div>
  <div class="main-stage">
    <div class="drums-grid" id="pads-grid"></div>
  </div>
  <script type="module" src="drums.js"></script>
</body>
</html>
