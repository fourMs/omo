<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f14" />
  <title>Vocoder Choir — OMO</title>
  <link rel="stylesheet" href="../../shared/ui.css" />
</head>
<body class="app-shell vocoder-choir-app">
  <header class="app-header">
    <a class="back-link" href="../../">←</a>
    <h1>Vocoder Choir</h1>
  </header>
  <div class="learn-panel panel" id="learnPanel">
    <h2>Vocoder choir</h2>
    <p>Turn <strong>Audio on</strong> and allow the mic. <strong>Hold</strong> the pad — your voice shapes resonant bands on a carrier choir.</p>
    <p><strong>Tilt</strong> the phone to shift vowel colour (band spacing).</p>
  </div>
  <p class="status-bar" id="status">Turn Audio on · hold pad to play</p>
  <div class="readout-row">
    <p class="value-chip">Mic <strong id="micOut">—</strong></p>
    <p class="value-chip">Vowel <strong id="vowelOut">—</strong> Hz</p>
  </div>
  <div class="main-stage">
    <div id="pad" class="stage-fill play-grid">
      <div class="touch-dot" id="dot"></div>
    </div>
  </div>
  <script type="module">
    import { bindLearn, registerAudioBoot, setStatus, startAudio } from "../../shared/app.js";
    import { connectMicAnalyser, createMasterBus, getMicStream, primeMicStream } from "../../shared/audio.js";
    import { enableSensors, onOrientation, primeSensors } from "../../shared/sensors.js";

    bindLearn();

    const pad = document.getElementById("pad");
    const dot = document.getElementById("dot");
    const BANDS = 5;
    const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

    let ctx, master, built = false;
    let micStream = null;
    let analyser = null;
    let micBuf = null;
    let carriers = [];
    let holding = false;
    let activePointer = null;
    let vowelHz = 520;
    let raf = 0;
    let tiltReady = false;

    function bandHz(i) {
      return vowelHz * Math.pow(1.35, i);
    }

    function buildAudio(c) {
      if (built) return;
      ctx = c;
      ({ master } = createMasterBus(c, 0.52));
      carriers = [];
      for (let i = 0; i < BANDS; i++) {
        const osc = ctx.createOscillator();
        const carBp = ctx.createBiquadFilter();
        const gn = ctx.createGain();
        osc.type = i % 2 ? "sawtooth" : "square";
        osc.frequency.value = bandHz(i) * 0.5;
        carBp.type = "bandpass";
        carBp.frequency.value = bandHz(i);
        carBp.Q.value = 6;
        gn.gain.value = 0;
        osc.connect(carBp);
        carBp.connect(gn);
        gn.connect(master);
        osc.start();
        carriers.push({ osc, carBp, gn, i });
      }
      analyser = ctx.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0.65;
      micBuf = new Uint8Array(analyser.frequencyBinCount);
      built = true;
    }

    registerAudioBoot(buildAudio, { mic: true });

    async function ensureMic() {
      if (micStream) return true;
      try {
        micStream = await getMicStream();
      } catch {
        setStatus("status", "Mic blocked — allow microphone", "warn");
        return false;
      }
      connectMicAnalyser(ctx, micStream, analyser, { inputGain: 1.7 });
      return true;
    }

    async function ensureTilt() {
      if (tiltReady) return;
      primeSensors({ needMotion: false, needOrientation: true });
      if (await enableSensors({ needMotion: false, needOrientation: true })) {
        tiltReady = true;
        onOrientation((o) => {
          vowelHz = clamp(320 + Math.abs(o.beta || 0) * 6, 280, 920);
          document.getElementById("vowelOut").textContent = vowelHz.toFixed(0);
          if (!ctx) return;
          const t = ctx.currentTime;
          carriers.forEach((c) => {
            const hz = bandHz(c.i);
            c.carBp.frequency.setTargetAtTime(hz, t, 0.07);
            c.osc.frequency.setTargetAtTime(hz * 0.5, t, 0.07);
          });
        });
      }
    }

    function binForHz(hz) {
      const nyquist = ctx.sampleRate / 2;
      return clamp(Math.floor((hz / nyquist) * micBuf.length), 0, micBuf.length - 1);
    }

    function modulateLoop() {
      if (!holding || !analyser || !ctx) return;
      analyser.getByteFrequencyData(micBuf);
      let peak = 0;
      const t = ctx.currentTime;
      carriers.forEach((c) => {
        const b = binForHz(bandHz(c.i));
        let sum = 0;
        for (let j = b - 1; j <= b + 1; j++) {
          if (j >= 0 && j < micBuf.length) sum += micBuf[j];
        }
        const e = sum / (3 * 255);
        peak = Math.max(peak, e);
        c.gn.gain.setTargetAtTime(e > 0.02 ? 0.04 + e * 0.28 : 0, t, 0.04);
      });
      document.getElementById("micOut").textContent = peak > 0.02 ? `${Math.round(peak * 100)}%` : "—";
      raf = requestAnimationFrame(modulateLoop);
    }

    function fadeOut() {
      if (!ctx) return;
      const t = ctx.currentTime;
      carriers.forEach((c) => c.gn.gain.setTargetAtTime(0, t, 0.06));
      document.getElementById("micOut").textContent = "—";
    }

    function placeDot(e) {
      const r = pad.getBoundingClientRect();
      dot.style.left = `${clamp((e.clientX - r.left) / r.width, 0, 1) * 100}%`;
      dot.style.top = `${clamp((e.clientY - r.top) / r.height, 0, 1) * 100}%`;
    }

    pad.addEventListener("pointerdown", async (e) => {
      e.preventDefault();
      primeMicStream();
      primeSensors({ needMotion: false, needOrientation: true });
      await startAudio(!built ? buildAudio : undefined);
      if (!built) return;
      if (!(await ensureMic())) return;
      void ensureTilt();
      holding = true;
      activePointer = e.pointerId;
      pad.setPointerCapture(e.pointerId);
      pad.classList.add("active");
      placeDot(e);
      setStatus("status", "Hold · sing or speak into mic", "ok");
      cancelAnimationFrame(raf);
      modulateLoop();
    });

    const release = (e) => {
      if (e.pointerId !== activePointer) return;
      holding = false;
      activePointer = null;
      pad.classList.remove("active");
      cancelAnimationFrame(raf);
      fadeOut();
      setStatus("status", "Hold pad to play", "");
    };

    pad.addEventListener("pointerup", release);
    pad.addEventListener("pointercancel", release);
    pad.addEventListener("lostpointercapture", release);
  </script>
</body>
</html>
