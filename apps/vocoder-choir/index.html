<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f14" />
  <title>Vocoder Choir — OMO</title>
  <link rel="stylesheet" href="../../shared/ui.css" />
</head>
<body class="app-shell vocoder-choir-app">
  <header class="app-header">
    <a class="back-link" href="../../">←</a>
    <h1>Vocoder Choir</h1>
  </header>
  <div class="learn-panel panel" id="learnPanel">
    <h2>Vocoder choir</h2>
    <p>Turn <strong>Audio on</strong> and allow the mic. <strong>Hold</strong> the centre button — your voice shapes resonant bands on a carrier choir.</p>
    <p><strong>Tilt</strong> the phone to shift vowel colour (band spacing).</p>
  </div>
  <p class="status-bar" id="status">Turn Audio on · hold button to play</p>
  <div class="control-row vocoder-live" aria-live="polite" aria-label="Vocoder">
    <label>Mic</label>
    <span><strong id="micOut">—</strong></span>
    <label>Vowel</label>
    <span><strong id="vowelOut">—</strong> Hz</span>
  </div>
  <div class="main-stage vocoder-stage">
    <button type="button" id="playBtn" class="vocoder-play-btn" aria-label="Hold to play vocoder">
      <span class="vocoder-play-icon" aria-hidden="true"></span>
      <span class="vocoder-play-label">Hold to sing</span>
    </button>
    <p class="vocoder-hint-text" id="hint">Voice opens the choir bands</p>
  </div>
  <script type="module">
    import { bindLearn, registerAudioBoot, setStatus, startAudio } from "../../shared/app.js";
    import { connectMicAnalyser, createMasterBus, primeMicStream } from "../../shared/audio.js";
    import { enableSensors, onOrientation, primeSensors } from "../../shared/sensors.js";

    bindLearn();

    const playBtn = document.getElementById("playBtn");
    const BANDS = 5;
    const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

    let ctx, master, built = false;
    let micStream = null;
    let analyser = null;
    let micBuf = null;
    let carriers = [];
    let holding = false;
    let activePointer = null;
    let endPointer = null;
    let vowelHz = 520;
    let raf = 0;
    let tiltReady = false;

    function bandHz(i) {
      return vowelHz * Math.pow(1.35, i);
    }

    function buildAudio(c) {
      if (built) return;
      ctx = c;
      ({ master } = createMasterBus(c, 0.52));
      carriers = [];
      for (let i = 0; i < BANDS; i++) {
        const osc = ctx.createOscillator();
        const carBp = ctx.createBiquadFilter();
        const gn = ctx.createGain();
        osc.type = i % 2 ? "sawtooth" : "square";
        osc.frequency.value = bandHz(i) * 0.5;
        carBp.type = "bandpass";
        carBp.frequency.value = bandHz(i);
        carBp.Q.value = 6;
        gn.gain.value = 0;
        osc.connect(carBp);
        carBp.connect(gn);
        gn.connect(master);
        osc.start();
        carriers.push({ osc, carBp, gn, i });
      }
      analyser = ctx.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0.65;
      micBuf = new Uint8Array(analyser.frequencyBinCount);
      built = true;
    }

    registerAudioBoot(buildAudio, { mic: true });

    async function ensureMic() {
      if (micStream) return true;
      if (!navigator.mediaDevices?.getUserMedia) {
        setStatus("status", "Mic not supported", "warn");
        return false;
      }
      try {
        micStream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
          video: false,
        });
      } catch {
        setStatus("status", "Mic blocked — allow microphone", "warn");
        return false;
      }
      connectMicAnalyser(ctx, micStream, analyser, { inputGain: 1.7 });
      return true;
    }

    async function ensureTilt() {
      if (tiltReady) return;
      primeSensors({ needMotion: false, needOrientation: true });
      if (await enableSensors({ needMotion: false, needOrientation: true })) {
        tiltReady = true;
        onOrientation((o) => {
          vowelHz = clamp(320 + Math.abs(o.beta || 0) * 6, 280, 920);
          document.getElementById("vowelOut").textContent = vowelHz.toFixed(0);
          if (!ctx) return;
          const t = ctx.currentTime;
          carriers.forEach((c) => {
            const hz = bandHz(c.i);
            c.carBp.frequency.setTargetAtTime(hz, t, 0.07);
            c.osc.frequency.setTargetAtTime(hz * 0.5, t, 0.07);
          });
        });
      }
    }

    function binForHz(hz) {
      const nyquist = ctx.sampleRate / 2;
      return clamp(Math.floor((hz / nyquist) * micBuf.length), 0, micBuf.length - 1);
    }

    function modulateLoop() {
      if (!holding || !analyser || !ctx) return;
      analyser.getByteFrequencyData(micBuf);
      let peak = 0;
      const t = ctx.currentTime;
      carriers.forEach((c) => {
        const b = binForHz(bandHz(c.i));
        let sum = 0;
        for (let j = b - 1; j <= b + 1; j++) {
          if (j >= 0 && j < micBuf.length) sum += micBuf[j];
        }
        const e = sum / (3 * 255);
        peak = Math.max(peak, e);
        c.gn.gain.setTargetAtTime(e > 0.02 ? 0.04 + e * 0.28 : 0, t, 0.04);
      });
      document.getElementById("micOut").textContent = peak > 0.02 ? `${Math.round(peak * 100)}%` : "—";
      raf = requestAnimationFrame(modulateLoop);
    }

    function fadeOut() {
      if (!ctx) return;
      const t = ctx.currentTime;
      carriers.forEach((c) => c.gn.gain.setTargetAtTime(0, t, 0.06));
      document.getElementById("micOut").textContent = "—";
    }

    function beginHold() {
      playBtn.classList.add("active");
      playBtn.querySelector(".vocoder-play-label").textContent = "Listening…";
      setStatus("status", "Hold · sing or speak into mic", "ok");
      cancelAnimationFrame(raf);
      modulateLoop();
    }

    function endHold() {
      holding = false;
      activePointer = null;
      playBtn.classList.remove("active");
      playBtn.querySelector(".vocoder-play-label").textContent = "Hold to sing";
      cancelAnimationFrame(raf);
      fadeOut();
      setStatus("status", "Hold button to play", "");
      if (endPointer) {
        window.removeEventListener("pointerup", endPointer);
        window.removeEventListener("pointercancel", endPointer);
        endPointer = null;
      }
    }

    primeSensors({ needMotion: false, needOrientation: true });

    playBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      if (holding) return;
      holding = true;
      activePointer = e.pointerId;
      try {
        playBtn.setPointerCapture(e.pointerId);
      } catch {
        /* noop */
      }

      endPointer = (ev) => {
        if (ev.pointerId !== activePointer) return;
        endHold();
        try {
          if (playBtn.hasPointerCapture(ev.pointerId)) playBtn.releasePointerCapture(ev.pointerId);
        } catch {
          /* noop */
        }
      };
      window.addEventListener("pointerup", endPointer);
      window.addEventListener("pointercancel", endPointer);

      void (async () => {
        primeMicStream();
        await startAudio(!built ? buildAudio : undefined);
        if (!holding || activePointer !== e.pointerId) return;
        if (!built) return;
        if (!(await ensureMic())) {
          endHold();
          return;
        }
        void ensureTilt();
        beginHold();
      })();
    });
  </script>
</body>
</html>
