<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f14" />
  <title>Room Reverb Send — OMO</title>
  <link rel="stylesheet" href="../../shared/ui.css" />
</head>
<body class="app-shell room-wash-app">
  <header class="app-header">
    <a class="back-link" href="../../">←</a>
    <h1>Room Reverb Send</h1>
  </header>
  <div class="learn-panel panel" id="learnPanel">
    <h2>Room reverb send</h2>
    <p>Turn <strong>Audio on</strong> and allow the mic. <strong>Hold</strong> the pad for a tone — room loudness pushes more reverb wash.</p>
    <p><strong>X</strong> = pitch. Louder ambience in the room = wetter signal.</p>
  </div>
  <p class="status-bar" id="status">Turn Audio on · hold pad to play</p>
  <div class="readout-row">
    <p class="value-chip">Pitch <strong id="hzOut">—</strong> Hz</p>
    <p class="value-chip">Room <strong id="roomOut">—</strong></p>
    <p class="value-chip">Wet <strong id="wetOut">—</strong></p>
  </div>
  <div class="main-stage">
    <div id="pad" class="stage-fill play-grid">
      <div class="touch-dot" id="dot"></div>
    </div>
  </div>
  <script type="module">
    import { bindLearn, registerAudioBoot, setStatus, startAudio } from "../../shared/app.js";
    import { connectMicAnalyser, createMasterBus, getMicStream, primeMicStream } from "../../shared/audio.js";
    import { createKSReverb } from "../../shared/ks.js";

    bindLearn();

    const pad = document.getElementById("pad");
    const dot = document.getElementById("dot");
    const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

    let ctx, master, built = false;
    let micStream = null;
    let osc, dry, sendGain, analyser, micBuf;
    let holding = false;
    let activePointer = null;
    let raf = 0;

    function buildAudio(c) {
      if (built) return;
      ctx = c;
      ({ master } = createMasterBus(c, 0.48));
      dry = ctx.createGain();
      dry.gain.value = 0;
      sendGain = ctx.createGain();
      sendGain.gain.value = 0;
      osc = ctx.createOscillator();
      osc.type = "sine";
      osc.frequency.value = 220;
      const reverbIn = createKSReverb(c, sendGain, 0.88);
      osc.connect(dry);
      dry.connect(master);
      osc.connect(reverbIn);
      sendGain.connect(master);
      osc.start();
      analyser = ctx.createAnalyser();
      analyser.fftSize = 512;
      analyser.smoothingTimeConstant = 0.55;
      micBuf = new Float32Array(analyser.fftSize);
      built = true;
    }

    registerAudioBoot(buildAudio, { mic: true });

    async function ensureMic() {
      if (micStream) return true;
      try {
        micStream = await getMicStream();
      } catch {
        setStatus("status", "Mic blocked — allow microphone", "warn");
        return false;
      }
      connectMicAnalyser(ctx, micStream, analyser, { inputGain: 1.6 });
      return true;
    }

    function micRms() {
      analyser.getFloatTimeDomainData(micBuf);
      let s = 0;
      for (let i = 0; i < micBuf.length; i++) s += micBuf[i] * micBuf[i];
      return Math.sqrt(s / micBuf.length);
    }

    function modulateLoop() {
      if (!holding || !ctx || !analyser) return;
      const rms = micRms();
      const wet = clamp(rms * 10, 0, 0.9);
      sendGain.gain.setTargetAtTime(wet, ctx.currentTime, 0.08);
      document.getElementById("roomOut").textContent = `${Math.round(rms * 1000) / 10}%`;
      document.getElementById("wetOut").textContent = `${Math.round(wet * 100)}%`;
      raf = requestAnimationFrame(modulateLoop);
    }

    function setTone(nx, on) {
      if (!ctx) return;
      const t = ctx.currentTime;
      const hz = 100 * Math.pow(5, nx);
      osc.frequency.setTargetAtTime(hz, t, 0.03);
      dry.gain.setTargetAtTime(on ? 0.22 : 0, t, on ? 0.025 : 0.07);
      document.getElementById("hzOut").textContent = on ? hz.toFixed(0) : "—";
    }

    function fadeOut() {
      if (!ctx) return;
      const t = ctx.currentTime;
      dry.gain.setTargetAtTime(0, t, 0.07);
      sendGain.gain.setTargetAtTime(0, t, 0.1);
      document.getElementById("hzOut").textContent = "—";
      document.getElementById("roomOut").textContent = "—";
      document.getElementById("wetOut").textContent = "—";
    }

    function placeDot(e) {
      const r = pad.getBoundingClientRect();
      dot.style.left = `${clamp((e.clientX - r.left) / r.width, 0, 1) * 100}%`;
      dot.style.top = `${clamp((e.clientY - r.top) / r.height, 0, 1) * 100}%`;
    }

    pad.addEventListener("pointerdown", async (e) => {
      e.preventDefault();
      primeMicStream();
      await startAudio(!built ? buildAudio : undefined);
      if (!built) return;
      if (!(await ensureMic())) return;
      holding = true;
      activePointer = e.pointerId;
      pad.setPointerCapture(e.pointerId);
      pad.classList.add("active");
      placeDot(e);
      const r = pad.getBoundingClientRect();
      setTone(clamp((e.clientX - r.left) / r.width, 0, 1), true);
      setStatus("status", "Hold · room loudness adds wash", "ok");
      cancelAnimationFrame(raf);
      modulateLoop();
    });

    pad.addEventListener("pointermove", (e) => {
      if (!holding || e.pointerId !== activePointer) return;
      placeDot(e);
      const r = pad.getBoundingClientRect();
      setTone(clamp((e.clientX - r.left) / r.width, 0, 1), true);
    });

    const release = (e) => {
      if (e.pointerId !== activePointer) return;
      holding = false;
      activePointer = null;
      pad.classList.remove("active");
      cancelAnimationFrame(raf);
      fadeOut();
      setStatus("status", "Hold pad to play", "");
    };

    pad.addEventListener("pointerup", release);
    pad.addEventListener("pointercancel", release);
    pad.addEventListener("lostpointercapture", release);
  </script>
</body>
</html>
