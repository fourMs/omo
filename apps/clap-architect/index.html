<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f14" />
  <title>Clap Architect — OMO</title>
  <link rel="stylesheet" href="../../shared/ui.css" />
  <style>
    .clap-grid-steps {
      display: flex;
      gap: 0.35rem;
      justify-content: center;
      padding: 0.4rem 0.5rem;
      flex-shrink: 0;
    }
    .clap-grid-steps button {
      width: 2rem;
      height: 2rem;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #1e293b;
      color: var(--muted);
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0;
    }
    .clap-grid-steps button.on {
      background: rgba(110, 231, 183, 0.25);
      border-color: var(--accent-dim);
      color: var(--accent);
    }
    .clap-grid-steps button.playhead {
      box-shadow: 0 0 0 2px rgba(251, 146, 60, 0.7);
    }
  </style>
</head>
<body class="app-shell">
  <header class="app-header">
    <a class="back-link" href="../../">←</a>
    <h1>Clap Architect</h1>
  </header>
  <div class="learn-panel panel" id="learnPanel">
    <h2>Clap architect</h2>
    <p>Turn <strong>Audio on</strong> and allow the <strong>mic</strong>. <strong>Clap</strong> to toggle the highlighted step (orange ring). <strong>Hold</strong> the pad to run the loop.</p>
    <p>You can also <strong>tap</strong> step numbers to toggle them by hand.</p>
  </div>
  <p class="status-bar" id="status">Turn Audio on · hold pad to play</p>
  <div class="clap-grid-steps" id="stepRow" aria-label="8 steps"></div>
  <div class="main-stage">
    <div id="pad" class="stage-fill play-grid">
      <div class="touch-dot" id="dot"></div>
    </div>
  </div>
  <script type="module">
    import { bindLearn, registerAudioBoot, setStatus, startAudio } from "../../shared/app.js";
    import { createMasterBus, getMicStream, primeMicStream } from "../../shared/audio.js";
    import { createOnsetDetector } from "../../shared/onset-detect.js";
    import { playKick, playSnare, playHat } from "../../shared/drum-sounds.js";

    bindLearn();

    const STEPS = 8;
    const STEP_MS = 400;
    const stepRow = document.getElementById("stepRow");
    const pad = document.getElementById("pad");
    const steps = Array(STEPS).fill(false);
    const stepBtns = [];

    let ctx, master, built = false;
    let holding = false;
    let stepIdx = 0;
    let timer = null;
    let detector = null;
    let ignoreOnsetUntil = 0;

    for (let i = 0; i < STEPS; i++) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = String(i + 1);
      btn.setAttribute("aria-label", `Step ${i + 1}`);
      btn.addEventListener("click", () => {
        steps[i] = !steps[i];
        renderSteps();
      });
      stepRow.appendChild(btn);
      stepBtns.push(btn);
    }

    function renderSteps() {
      stepBtns.forEach((btn, i) => {
        btn.classList.toggle("on", steps[i]);
        btn.classList.toggle("playhead", holding && i === stepIdx);
      });
    }

    function playStep(i) {
      if (!steps[i] || !ctx || !master) return;
      if (i % 3 === 0) playKick(ctx, master);
      else if (i % 3 === 1) playSnare(ctx, master);
      else playHat(ctx, master);
    }

    function buildAudio(c) {
      ctx = c;
      ({ master } = createMasterBus(c, 0.55));
      built = true;
    }

    async function setupMic() {
      if (detector) return true;
      try {
        const stream = await getMicStream();
        detector = createOnsetDetector(ctx, stream, {
          onOnset: (t) => {
            if (t < ignoreOnsetUntil) return;
            steps[stepIdx] = !steps[stepIdx];
            renderSteps();
            ignoreOnsetUntil = t + 0.14;
          },
        });
        detector.start();
        setStatus("status", "Clap toggles highlighted step · hold pad to play", "ok");
        return true;
      } catch {
        setStatus("status", "Mic blocked — tap step numbers to build pattern", "warn");
        return false;
      }
    }

    function startLoop() {
      stopLoop();
      timer = setInterval(() => {
        if (!holding || !ctx) return;
        playStep(stepIdx);
        stepIdx = (stepIdx + 1) % STEPS;
        renderSteps();
      }, STEP_MS);
    }

    function stopLoop() {
      if (timer) clearInterval(timer);
      timer = null;
      renderSteps();
    }

    async function boot(c) {
      buildAudio(c);
      await setupMic();
    }

    registerAudioBoot(boot, { mic: true });

    pad.addEventListener("pointerdown", async (e) => {
      e.preventDefault();
      primeMicStream();
      await startAudio(!built ? boot : undefined);
      if (!built) return;
      holding = true;
      pad.classList.add("active");
      startLoop();
    });

    const release = () => {
      holding = false;
      pad.classList.remove("active");
      stopLoop();
    };
    pad.addEventListener("pointerup", release);
    pad.addEventListener("pointercancel", release);
    pad.addEventListener("lostpointercapture", release);

    renderSteps();
  </script>
</body>
</html>
