<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f14" />
  <title>Flute Blow — OMO</title>
  <link rel="stylesheet" href="../../shared/ui.css" />
</head>
<body class="app-shell">
  <header class="app-header">
    <a class="back-link" href="../../">←</a>
    <h1>Flute Blow</h1>
  </header>
  <div class="learn-panel panel" id="learnPanel">
    <h2>Breath + finger holes</h2>
    <p>Turn <strong>Audio on</strong>, allow the mic, then <strong>hold</strong> finger holes while you <strong>blow</strong> past the yellow line — no hold, no tone.</p>
    <p><strong>Release</strong> a hole to open it. Open from the <strong>bottom</strong> upward for higher notes (C → D → E → G → A → C). Bottom hole is nearest the screen edge.</p>
  </div>
  <p class="status-bar" id="status"></p>
  <div class="breath-row">
    <label>Breath</label>
    <div class="breath-meter breath-threshold" id="breathWrap" style="--thresh: 35%">
      <div class="breath-meter-fill" id="breathMeter"></div>
    </div>
  </div>
  <div class="main-stage">
    <div id="fluteBody" class="stage-fill flute-body">
      <span class="pad-readout" id="readout">C4</span>
      <div class="flute-tube" id="fluteTube" aria-label="Finger holes"></div>
    </div>
  </div>
  <script type="module">
    import { bindLearn, setStatus, startAudio, registerAudioBoot } from "../../shared/app.js";
    import { createMasterBus, midiToFreq, connectMicAnalyser, getMicStream, primeMicStream } from "../../shared/audio.js";

    bindLearn();
    const PENTA = [0, 2, 4, 7, 9];
    const ROOT_MIDI = 60;
    const NOTE_NAMES = ["C", "D", "E", "G", "A"];
    const HOLE_COUNT = 5;
    /** Consecutive open holes from bottom (0–5) → pentatonic step 0–5 (C4…C5). */
    const OPEN_TO_INDEX = [0, 1, 2, 3, 4, 5];

    const fluteTube = document.getElementById("fluteTube");
    let ctx, master, analyser, micStream;
    let toneGain, toneOsc, vibOsc, vibGain, noiseGain, noiseSrc;
    let blowThreshold = 0.02;
    let wasBlowing = false;
    let breathEnv = 0;
    let currentMidi = 60;
    let noteIndex = 0;
    let ready = false;
    let booting = false;
    let timeData = new Float32Array(2048);
    /** true = hole covered (open when released). */
    const holesCovered = [true, true, true, true, true];
    /** true while finger is down on that hole. */
    const holesHeld = [false, false, false, false, false];
    const holeBtns = [];
    let heldCount = 0;
    let bootPromise = null;

    function indexToMidi(i) {
      const idx = Math.max(0, Math.min(5, Math.round(i)));
      return ROOT_MIDI + Math.floor(idx / 5) * 12 + PENTA[idx % 5];
    }

    function labelFromIndex(i) {
      const idx = Math.max(0, Math.min(5, Math.round(i)));
      return `${NOTE_NAMES[idx % 5]}${4 + Math.floor(idx / 5)}`;
    }

    /** Open holes from the bottom of the tube upward (hole 0 = bottom). */
    function openStepsFromBottom() {
      let n = 0;
      for (let i = 0; i < HOLE_COUNT; i++) {
        if (!holesCovered[i]) n++;
        else break;
      }
      return n;
    }

    function setPitch(when) {
      if (!toneOsc || !ctx) return;
      const freq = midiToFreq(currentMidi);
      toneOsc.frequency.cancelScheduledValues(when);
      toneOsc.frequency.setValueAtTime(freq, when);
    }

    function applyFingering() {
      const steps = openStepsFromBottom();
      noteIndex = OPEN_TO_INDEX[Math.min(steps, OPEN_TO_INDEX.length - 1)];
      currentMidi = indexToMidi(noteIndex);
      document.getElementById("readout").textContent = labelFromIndex(noteIndex);
      holeBtns.forEach((btn, i) => {
        btn.classList.toggle("open", !holesCovered[i]);
        btn.classList.toggle("covered", holesCovered[i]);
        btn.setAttribute("aria-pressed", holesCovered[i] ? "true" : "false");
        btn.setAttribute("aria-label", `Hole ${i + 1} (bottom=1) ${holesCovered[i] ? "covered" : "open"}`);
      });
    }

    function anyHoleHeld() {
      return heldCount > 0;
    }

    function readBreath() {
      const rms = getRms();
      const onThresh = wasBlowing ? blowThreshold * 0.5 : blowThreshold * 0.82;
      const blowing = rms > onThresh;
      wasBlowing = blowing;
      const headroom = Math.max(0.012, 0.065 - onThresh);
      const s = blowing ? Math.min(1, Math.max(0.2, (rms - onThresh) / headroom)) : 0;
      return { rms, blowing, s, onThresh };
    }

    function syncPitchIfPlaying() {
      if (!ctx || !toneOsc) return;
      const { blowing } = readBreath();
      if (blowing && anyHoleHeld()) setPitch(ctx.currentTime);
    }

    function onHoleDown(i, e) {
      e.preventDefault();
      e.stopPropagation();
      primeMicStream();
      void enableAudio();
      if (!holesHeld[i]) {
        holesHeld[i] = true;
        heldCount++;
      }
      holesCovered[i] = true;
      holeBtns[i].classList.add("held");
      holeBtns[i].setPointerCapture(e.pointerId);
      applyFingering();
      syncPitchIfPlaying();
    }

    function onHoleUp(i, e) {
      if (!holesHeld[i]) return;
      holesHeld[i] = false;
      heldCount = Math.max(0, heldCount - 1);
      holesCovered[i] = false;
      holeBtns[i].classList.remove("held");
      try {
        holeBtns[i].releasePointerCapture(e.pointerId);
      } catch {
        /* noop */
      }
      applyFingering();
    }

    for (let i = 0; i < HOLE_COUNT; i++) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "flute-hole covered";
      btn.dataset.hole = String(i + 1);
      btn.addEventListener("pointerdown", (e) => onHoleDown(i, e));
      btn.addEventListener("pointerup", (e) => onHoleUp(i, e));
      btn.addEventListener("pointercancel", (e) => onHoleUp(i, e));
      btn.addEventListener("lostpointercapture", (e) => onHoleUp(i, e));
      fluteTube.appendChild(btn);
      holeBtns.push(btn);
    }
    applyFingering();

    function getRms() {
      if (!analyser) return 0;
      analyser.getFloatTimeDomainData(timeData);
      let s = 0;
      for (let i = 0; i < timeData.length; i++) s += timeData[i] ** 2;
      return Math.sqrt(s / timeData.length);
    }

    async function calibrate() {
      const samples = [];
      const t0 = performance.now();
      while (performance.now() - t0 < 600) {
        samples.push(getRms());
        await new Promise((r) => requestAnimationFrame(r));
      }
      const floor = samples.reduce((a, b) => a + b, 0) / samples.length;
      blowThreshold = Math.max(0.005, floor * 1.35 + 0.0025);
      document.getElementById("breathWrap").style.setProperty(
        "--thresh",
        `${Math.min(88, ((blowThreshold * 0.82) / 0.075) * 100)}%`
      );
    }

    function setVibrato(on, breath, when) {
      if (!vibGain) return;
      const depth = on ? 7 + breath * 16 : 0;
      vibGain.gain.setTargetAtTime(depth, when, on ? 0.06 : 0.05);
    }

    function createVoice() {
      toneGain = ctx.createGain();
      toneGain.gain.value = 0;
      toneOsc = ctx.createOscillator();
      toneOsc.type = "triangle";
      toneOsc.frequency.value = midiToFreq(currentMidi);
      vibOsc = ctx.createOscillator();
      vibGain = ctx.createGain();
      vibOsc.type = "sine";
      vibOsc.frequency.value = 5.5 + Math.random() * 1.2;
      vibGain.gain.value = 0;
      vibOsc.connect(vibGain);
      vibGain.connect(toneOsc.detune);
      vibOsc.start();
      const f = ctx.createBiquadFilter();
      f.type = "lowpass";
      f.Q.value = 0.9;
      f.frequency.value = 4200;
      const bright = ctx.createBiquadFilter();
      bright.type = "peaking";
      bright.frequency.value = 1800;
      bright.Q.value = 1.2;
      bright.gain.value = 4;
      toneOsc.connect(f);
      f.connect(bright);
      bright.connect(toneGain);
      toneGain.connect(master);
      toneOsc.start();
      noiseGain = ctx.createGain();
      noiseGain.gain.value = 0;
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.2, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.5;
      noiseSrc = ctx.createBufferSource();
      noiseSrc.buffer = buf;
      noiseSrc.loop = true;
      const nf = ctx.createBiquadFilter();
      nf.type = "bandpass";
      nf.frequency.value = 1200;
      noiseSrc.connect(nf);
      nf.connect(noiseGain);
      noiseGain.connect(master);
      noiseSrc.start();
    }

    function tick() {
      if (!ready) return;
      const { rms, blowing, s } = readBreath();
      document.getElementById("breathMeter").style.width = `${Math.min(100, (rms / 0.075) * 100)}%`;
      document.getElementById("breathMeter").classList.toggle("blowing", blowing);
      const t = ctx.currentTime;
      const holding = anyHoleHeld();
      const shouldPlay = blowing && holding;
      const targetEnv = shouldPlay ? Math.max(0.5, 0.42 + s * 0.58) : 0;
      breathEnv += (targetEnv - breathEnv) * (targetEnv > breathEnv ? 0.55 : shouldPlay ? 0.1 : 0.32);
      document.getElementById("breathMeter").classList.toggle("holding", holding);
      if (shouldPlay || breathEnv > 0.008) {
        toneGain.gain.setTargetAtTime(breathEnv * 0.95, t, 0.01);
        noiseGain.gain.setTargetAtTime(breathEnv * s * 0.22, t, 0.012);
        setPitch(t);
        setVibrato(true, s, t);
      } else {
        toneGain.gain.setTargetAtTime(0, t, 0.04);
        noiseGain.gain.setTargetAtTime(0, t, 0.04);
        setVibrato(false, 0, t);
      }
      requestAnimationFrame(tick);
    }

    async function boot(c) {
      if (ready) return;
      if (!navigator.mediaDevices?.getUserMedia) {
        setStatus("status", "Mic not supported", "warn");
        throw new Error("no mic");
      }
      ctx = c;
      ({ master } = createMasterBus(ctx, 0.88));
      try {
        micStream = await getMicStream();
      } catch {
        setStatus("status", "Mic denied — allow in Settings", "warn");
        throw new Error("denied");
      }
      analyser = ctx.createAnalyser();
      analyser.fftSize = 2048;
      timeData = new Float32Array(analyser.fftSize);
      connectMicAnalyser(ctx, micStream, analyser, { inputGain: 2.2 });
      createVoice();
      setStatus("status", "Calibrating… stay quiet", "");
      await calibrate();
      ready = true;
      setStatus("status", "Hold holes + blow for tone", "ok");
      tick();
    }

    async function enableAudio() {
      if (ready) {
        await startAudio();
        return;
      }
      if (bootPromise) {
        await bootPromise;
        return;
      }
      booting = true;
      bootPromise = startAudio(boot).finally(() => {
        booting = false;
        bootPromise = null;
      });
      await bootPromise;
    }

    registerAudioBoot(boot, { mic: true });

    document.getElementById("fluteBody").addEventListener("pointerdown", (e) => {
      if (e.target.closest(".flute-hole")) return;
      primeMicStream();
      if (!ready && !booting) void enableAudio();
    });
  </script>
</body>
</html>
